<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NinjaFileNavigator Privacy Policy</title>
    <script>
        var language = (navigator.language || navigator.userLanguage || "").toLowerCase();
        var target = language.startsWith("ja")
            ? "ja/privacy-policy.html"
            : "en/privacy-policy.html";
        window.location.replace(target + window.location.search + window.location.hash);
    </script>
</head>
<body>
    <p><a href="ja/privacy-policy.html">日本語</a> / <a href="en/privacy-policy.html">English</a></p>
</body>
</html>
