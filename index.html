<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mobazou Developer Site</title>
    <script>
        var language = (navigator.language || navigator.userLanguage || "").toLowerCase();
        var target = language.startsWith("ja") ? "ja/" : "en/";
        window.location.replace(target);
    </script>
</head>
<body>
    <p><a href="ja/">日本語</a> / <a href="en/">English</a></p>
</body>
</html>
